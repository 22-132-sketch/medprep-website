<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — MedPREP</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #C9A84C; --gold-dim: rgba(201,168,76,0.12); --gold-border: rgba(201,168,76,0.25);
      --black: #000; --surface-2: #0f0f0f; --border: rgba(255,255,255,0.07);
      --text-secondary: #999; --text-muted: #555;
    }
    body {
      background: var(--black); color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      -webkit-font-smoothing: antialiased;
      position: relative; overflow: hidden;
    }
    .bg {
      position: absolute; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 100%);
    }
    .glow {
      position: absolute; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
    }
    .wrap { position: relative; z-index: 1; max-width: 480px; }
    .num {
      font-family: 'Playfair Display', serif;
      font-size: 96px; font-weight: 700; color: var(--gold);
      opacity: 0.15; line-height: 1; margin-bottom: 16px;
    }
    .icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--gold-dim); border: 1.5px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; color: var(--gold); margin: 0 auto 24px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px; font-weight: 700; margin-bottom: 12px;
    }
    h1 span { color: var(--gold); }
    p { color: var(--text-secondary); font-size: 14px; line-height: 1.75; margin-bottom: 36px; }
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--gold); color: #000; border: none;
      padding: 13px 28px; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      text-decoration: none; font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--gold);
      border: 1.5px solid rgba(201,168,76,0.6);
      padding: 12px 24px; border-radius: 10px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      text-decoration: none; font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: var(--gold-dim); }
    .links { margin-top: 32px; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .links a { color: var(--text-muted); font-size: 13px; text-decoration: none; transition: color 0.2s; }
    .links a:hover { color: var(--gold); }
    svg { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="glow" aria-hidden="true"></div>
  <div class="wrap">
    <div class="num" aria-hidden="true">404</div>
    <div class="icon" aria-hidden="true"><i class="ti ti-map-off"></i></div>
    <h1>Page <span>Not Found</span></h1>
    <p>The page you are looking for does not exist or may have been moved. Let us get you back on track.</p>
    <div class="btns">
      <a href="index.html" class="btn-primary">
        <i class="ti ti-home" aria-hidden="true"></i>
        Back to Home
      </a>
      <a href="register.html" class="btn-secondary">
        Register Now
      </a>
    </div>
    <div class="links">
      <a href="features.html">Features</a>
      <a href="index.html#pricing">Pricing</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</body>
</html>
